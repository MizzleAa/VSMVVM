name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test - Core
      run: dotnet test tests/VSMVVM.Core.Tests/VSMVVM.Core.Tests.csproj --no-build --configuration Release --verbosity normal --filter "Category!=Stress" --blame-hang-timeout 3m --blame-hang-dump-type mini --logger "trx;LogFileName=test-results.trx"

    - name: Test - Core.Scheduler
      if: always()
      run: dotnet test tests/VSMVVM.Core.Scheduler.Tests/VSMVVM.Core.Scheduler.Tests.csproj --no-build --configuration Release --verbosity normal --filter "Category!=Stress" --blame-hang-timeout 3m --blame-hang-dump-type mini --logger "trx;LogFileName=test-results.trx"

    - name: Test - Core.Scheduler.Scripting
      if: always()
      run: dotnet test tests/VSMVVM.Core.Scheduler.Scripting.Tests/VSMVVM.Core.Scheduler.Scripting.Tests.csproj --no-build --configuration Release --verbosity normal --filter "Category!=Stress" --blame-hang-timeout 3m --blame-hang-dump-type mini --logger "trx;LogFileName=test-results.trx"

    - name: Test - WPF
      if: always()
      run: dotnet test tests/VSMVVM.WPF.Tests/VSMVVM.WPF.Tests.csproj --no-build --configuration Release --verbosity normal --filter "Category!=Stress" --blame-hang-timeout 3m --blame-hang-dump-type mini --logger "trx;LogFileName=test-results.trx"

    - name: Test - WPF.Scheduler
      if: always()
      run: dotnet test tests/VSMVVM.WPF.Scheduler.Tests/VSMVVM.WPF.Scheduler.Tests.csproj --no-build --configuration Release --verbosity normal --filter "Category!=Stress" --blame-hang-timeout 3m --blame-hang-dump-type mini --logger "trx;LogFileName=test-results.trx"

    - name: Test - WPF.Scheduler.Editor
      if: always()
      run: dotnet test tests/VSMVVM.WPF.Scheduler.Editor.Tests/VSMVVM.WPF.Scheduler.Editor.Tests.csproj --no-build --configuration Release --verbosity normal --filter "Category!=Stress" --blame-hang-timeout 3m --blame-hang-dump-type mini --logger "trx;LogFileName=test-results.trx"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          **/test-results.trx
          **/*.dmp
          **/Sequence_*.xml
